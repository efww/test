<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIP PDF Gateway PoC</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-panel">
        <p class="eyebrow">1차 기술검증</p>
        <h1>AIP PDF Gateway PoC</h1>
        <p class="lead">
          회사 문서에 접근하지 않고 일반 PDF 뷰어, 읽기 전용 UX, 로그인 골격을 검증하는 데스크톱 앱입니다.
        </p>
        <div class="actions">
          <button class="primary-action" type="button" disabled>PDF 열기</button>
          <button class="secondary-action" type="button" disabled>Microsoft 로그인</button>
        </div>
      </section>

      <aside class="status-panel" aria-label="앱 상태">
        <h2>상태</h2>
        <dl>
          <div>
            <dt>앱</dt>
            <dd id="app-name">-</dd>
          </div>
          <div>
            <dt>버전</dt>
            <dd id="app-version">-</dd>
          </div>
          <div>
            <dt>플랫폼</dt>
            <dd id="app-platform">-</dd>
          </div>
          <div>
            <dt>빌드</dt>
            <dd id="app-build">-</dd>
          </div>
        </dl>
      </aside>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
